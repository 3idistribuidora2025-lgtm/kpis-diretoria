
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard KPIs — Junho 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg:#F4F5F7; --surface:#FFFFFF; --surface2:#F0F4F8; --border:#D9E2EC;
    --text:#16243B; --muted:#64748B; --accent:#1A65B8;
    --green:#0F6E56; --red:#993C1D; --amber:#854F0B;
    --sp:#1A65B8; --poa:#0F6E56;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

  header{padding:20px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;background:#1A65B8}
  .header-left{display:flex;align-items:center;gap:14px}
  .header-logo{width:40px;height:40px;border-radius:8px;object-fit:cover;background:#fff;padding:2px}
  .header-left h1{font-size:20px;font-weight:700;letter-spacing:-.3px;color:#fff}
  .header-left p{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px}
  .header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
  .badge-info{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35)}
  .badge-ok{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35)}
  .badge-warn{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35)}
  .btn-refresh{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s}
  .btn-refresh:hover{background:rgba(255,255,255,.25)}
  .spin{display:inline-block;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}


  .tabs{display:flex;gap:2px;padding:20px 40px 0;border-bottom:1px solid var(--border)}
  .tab{padding:9px 20px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:all .2s;user-select:none}
  .tab.active{color:var(--text);border-bottom-color:var(--accent)}
  .tab:hover:not(.active){color:var(--text)}

  .panel{display:none;padding:32px 40px}
  .panel.active{display:block}

  /* LOADING */
  .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;color:var(--muted)}
  .loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  .error-state{background:rgba(224,101,74,.08);border:1px solid rgba(224,101,74,.3);border-radius:10px;padding:24px;color:var(--red);text-align:center;margin:20px 0}
  .error-state p{margin-top:8px;font-size:13px;color:var(--muted)}

  /* KPI CARDS */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:32px}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;box-shadow:0 1px 3px rgba(16,36,59,.05)}
  .kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px}
  .kpi-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;line-height:1}
  .kpi-sub{font-size:11px;color:var(--muted);margin-top:6px}
  .green{color:var(--green)} .red{color:var(--red)} .amber{color:var(--amber)}

  .section-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}

  .table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:32px;background:var(--surface);box-shadow:0 1px 3px rgba(16,36,59,.05)}
  .table-wrap.fit{overflow-x:visible}
  .table-wrap.fit table{width:100%;table-layout:fixed;font-size:11px}
  .table-wrap.fit th{padding:8px 6px;font-size:9.5px;white-space:normal;overflow:hidden}
  .table-wrap.fit td{padding:7px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .table-wrap.fit td.mono{font-size:10.5px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  thead tr{background:var(--surface2)}
  th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--border)}
  th.num,td.num{text-align:right}
  tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(26,101,184,.04)}
  td{padding:10px 14px;white-space:nowrap}
  td.mono{font-family:'JetBrains Mono',monospace;font-size:12px}

  .team-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.4px}
  .team-sp{background:rgba(122,180,232,.18);color:var(--sp)}
  .team-poa{background:rgba(16,168,142,.18);color:var(--poa)}

  .status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600}
  .status-ok{background:rgba(16,168,142,.15);color:var(--green)}
  .status-out{background:rgba(224,101,74,.15);color:var(--red)}
  .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
  .dot-green{background:var(--green)} .dot-red{background:var(--red)}

  .prog-wrap{display:flex;align-items:center;gap:8px}
  .prog-bar{flex:1;height:5px;background:var(--border);border-radius:3px;min-width:60px}
  .prog-fill{height:100%;border-radius:3px}
  .prog-label{font-family:'JetBrains Mono',monospace;font-size:11px;min-width:38px;text-align:right}

  .gap-pos{color:var(--green);font-family:'JetBrains Mono',monospace;font-size:12px}
  .gap-neg{color:var(--red);font-family:'JetBrains Mono',monospace;font-size:12px}

  .week-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
  @media(max-width:900px){.week-grid{grid-template-columns:1fr}}
  .week-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;box-shadow:0 1px 3px rgba(16,36,59,.05)}
  .week-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:14px}
  .week-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .week-name{width:150px;font-size:11.5px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .week-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px}
  .week-bar-fill{height:100%;border-radius:3px}
  .week-val{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);min-width:75px;text-align:right}

  .totals-row{background:var(--surface2)!important;font-weight:600}
  footer{padding:20px 40px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center}

  @media(max-width:700px){header,.tabs,.panel{padding-left:18px;padding-right:18px}}

  .toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}
  .filter-group{display:flex;gap:6px;flex-wrap:wrap}
  .filter-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
  .filter-btn.active{color:var(--text);border-color:var(--accent);background:rgba(37,119,204,.18)}
  .filter-btn.sp.active{border-color:var(--sp);background:rgba(122,180,232,.20);color:var(--sp);box-shadow:0 0 0 1px var(--sp)}
  .filter-btn.poa.active{border-color:var(--poa);background:rgba(16,168,142,.20);color:var(--poa);box-shadow:0 0 0 1px var(--poa)}
  .export-btn{padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s}
  .export-btn:hover{background:var(--border)}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:32px;box-shadow:0 1px 3px rgba(16,36,59,.05)}
  .chart-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:16px}


  /* ===== MOBILE ===== */
  @media(max-width:640px){
    header{padding:14px 16px;flex-direction:column;align-items:flex-start;gap:10px}
    .header-logo{width:34px;height:34px}
    .header-left h1{font-size:15px}
    .header-left p{font-size:10px}
    .header-right{width:100%;flex-wrap:wrap;gap:6px}
    .badge{font-size:10px;padding:3px 8px}
    .btn-refresh{font-size:11px;padding:5px 10px}
    .tabs{padding:0;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;display:flex}
    .tab{padding:10px 14px;font-size:12px;flex-shrink:0}
    .panel{padding:16px}
    .kpi-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .kpi-card{padding:12px 14px}
    .kpi-label{font-size:9px}
    .kpi-value{font-size:16px}
    .kpi-sub{font-size:10px}
    .section-title{font-size:11px;margin-bottom:10px}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{font-size:11px;min-width:580px}
    th{padding:7px 8px;font-size:9px}
    td{padding:7px 8px}
    td.mono{font-size:10px}
    .prog-bar{min-width:40px}
    .prog-label{font-size:9px;min-width:30px}
    .status-badge{font-size:9px;padding:2px 6px}
    .chart-card{flex-direction:column;gap:16px}
    .toolbar{flex-direction:column;align-items:flex-start;gap:10px}
    .filter-group{flex-wrap:wrap;gap:6px}
    .filter-btn{font-size:11px;padding:5px 12px}
    .export-btn{font-size:11px;padding:5px 12px;width:100%;justify-content:center}
    .week-row{gap:6px}
    .week-name{width:110px;font-size:10px}
    .week-val{font-size:10px;min-width:60px}
    .week-card{padding:12px 14px}
    .week-card-title{font-size:10px}
    footer{padding:14px 16px;font-size:10px}
  }
  @media(max-width:700px){header,.tabs,.panel{padding-left:16px;padding-right:16px}}
</style>
<script>
(function loadXLSX() {
  const sources = [
    'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
    'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'
  ];
  let i = 0;
  function tryNext() {
    if (i >= sources.length) return;
    const s = document.createElement('script');
    s.src = sources[i];
    s.onerror = () => { i++; tryNext(); };
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>

<script>
const SHEET_ID = '1LVypMf3e4TGDtcYa7p9z6Po3Ku3ZDCjSbMVh6V14xcA';

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyO9r0PY9riCRYGK47pThgP76N7AGe8X4IaM1smdvJt4-8i_aZxokUcZRGAInIFq0rtXw/exec';
function csvUrl(sheet) {
  return `${APPS_SCRIPT_URL}?sheet=${encodeURIComponent(sheet)}&_=${Date.now()}`;
}

async function fetchCSV(sheet, attempt=1) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);
    const res = await fetch(csvUrl(sheet), { signal: controller.signal, cache: 'no-store' });
    clearTimeout(timeout);
    if (!res.ok) throw new Error(`Erro ao buscar aba "${sheet}": ${res.status}`);
    return res.text();
  } catch(e) {
    if (attempt < 3) {
      await new Promise(r => setTimeout(r, 2000));
      return fetchCSV(sheet, attempt + 1);
    }
    throw e;
  }
}

function parseCSV(text) {
  return text.split('\n').map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    return cols;
  });
}

function num(v) {
  if (!v || v === '' || v === '—') return null;
  const s = v.toString().trim();
  // Handle Excel error values
  if (s.startsWith('#') || s === 'N/A' || s === 'NULL') return null;
  return parseFloat(s.replace(/[^\d.\-]/g, '')) || 0;
}

function fmt(n, decimals=2) {
  if (n == null) return '—';
  return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:decimals, maximumFractionDigits:decimals});
}
function fmtC(n) {
  // Compact currency: R$ 93,6K / R$ 1,2M — no minus sign duplication issues
  if (n == null) return '—';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1000000) return sign + 'R$ ' + (abs/1000000).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + 'M';
  if (abs >= 1000) return sign + 'R$ ' + (abs/1000).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + 'K';
  return sign + 'R$ ' + abs.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function fmtI(n) {
  // Integer currency, no decimals, no abbreviation: R$ 93.551
  if (n == null) return '—';
  return 'R$ ' + Math.round(n).toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function fmtN(n) {
  if (n == null) return '—';
  return n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function pct(n) {
  if (n == null || isNaN(n)) return '—';
  return (n*100).toFixed(1)+'%';
}
function teamBadge(t) {
  const cls = t ? t.toLowerCase() : '';
  return `<span class="team-badge team-${cls}">${t||'—'}</span>`;
}

function parseMensal(rows) {
  // Top info: col C (index 2) = label, col D (index 3) = value
  // Row 0=Dias Uteis, 1=Data, 2=Data Final, 3=Dias Restantes, 4=% Passado, 5=Media Dias, 6=Projecao
  let diasUteis=21, diasRestantes=0, pctPassado=0, mediaDias=0, projecao=0;

  function parseVal(v) {
    if (!v && v !== 0) return null;
    const s = v.toString().replace('%','').replace('R$','').replace(/\s/g,'').replace(',','.').trim();
    return parseFloat(s) || 0;
  }

  // Read fixed rows by index (from CSV output):
  // row 0: Dias Úteis       -> col 3
  // row 1: Data (inicial)   -> col 3
  // row 2: Data Final       -> col 3
  // row 3: Dias Restantes   -> col 3
  // row 4: % Dias Passados  -> col 3 (decimal 0.333)
  // row 5: Média Dias       -> col 3
  // row 6: Projeção         -> col 3
  if (rows[0]) diasUteis     = parseVal(rows[0][3]) || 21;
  let dataInicial = rows[1] ? (rows[1][3]||'').toString() : '';
  let dataFinal   = rows[2] ? (rows[2][3]||'').toString() : '';
  if (rows[3]) diasRestantes = parseVal(rows[3][3]) || 0;
  if (rows[4]) pctPassado    = parseVal(rows[4][3]) || 0;
  if (rows[5]) mediaDias     = parseVal(rows[5][3]) || 0;
  if (rows[6]) projecao      = parseVal(rows[6][3]) || 0;

  // Find header row (contains "Vendedor")
  let headerIdx = 9;
  for (let i = 0; i < rows.length; i++) {
    for (let j = 0; j < rows[i].length; j++) {
      if ((rows[i][j]||'').toString().toLowerCase().includes('vendedor')) { headerIdx = i; break; }
    }
  }

  const headers = rows[headerIdx];
  const colIdx = {};
  headers.forEach((h,i) => { if(h) colIdx[h.toString().trim().toUpperCase()] = i; });

  const sellers = [];
  let sheetIcmTotal = null;
  let sheetMetaClienteTotal = null;
  let sheetComprouTotal = null;
  let sheetGapClienteTotal = null;
  for (let i = headerIdx+1; i < rows.length; i++) {
    const r = rows[i];
    const vendedor = r[2] ? r[2].toString().trim() : '';
    if (!vendedor || vendedor.toLowerCase().startsWith('totai')) {
      if (vendedor.toLowerCase().startsWith('totai')) {
        // totals row - capture the sheet's own exact totals (more reliable than summing rows,
        // since some columns like GAP CLIENTES use a non-additive per-team formula)
        sellers._totals = r;
        sheetIcmTotal = num(r[9]);
        sheetMetaClienteTotal = num(r[12]);
        sheetComprouTotal = num(r[13]);
        sheetGapClienteTotal = num(r[14]);
      }
      continue;
    }
    sellers.push({
      rank:    num(r[0]),
      equipe:  r[1] ? r[1].toString().trim() : '',
      nome:    vendedor,
      meta:    num(r[3]),
      fat:     num(r[4]),
      agFin:   num(r[5]),
      va:      num(r[6]),
      agFat:   num(r[7]),
      total:   num(r[8]),
      icm:     num(r[9]),
      status:  r[10] ? r[10].toString().trim() : '',
      gap:     num(r[11]),
      metaCliente: num(r[12]),
      comprou: num(r[13]),
      gapC:    num(r[14]),
      aberto:  num(r[15]),
      comOrc:  num(r[16]),
      qtdOrc:  num(r[17]),
      totalOrc:num(r[18]),
      conv:    num(r[19]),
      metaDia: num(r[20]),
    });
  }

  function formatDateBR(raw) {
    if (!raw) return '';
    const d = new Date(raw);
    if (isNaN(d.getTime())) return raw;
    const dd = String(d.getUTCDate()).padStart(2,'0');
    const mm = String(d.getUTCMonth()+1).padStart(2,'0');
    const yyyy = d.getUTCFullYear();
    return `${dd}/${mm}/${yyyy}`;
  }
  // "Data" cell holds today's date, not the month's start — use it only to get month/year,
  // then find the first business day (Mon-Fri) of that month for the header period display.
  const refDate = new Date(dataFinal || dataInicial);
  let dataInicialFmt;
  if (!isNaN(refDate.getTime())) {
    const yyyy = refDate.getUTCFullYear();
    const mm = refDate.getUTCMonth();
    let firstBizDay = new Date(Date.UTC(yyyy, mm, 1));
    while (firstBizDay.getUTCDay() === 0 || firstBizDay.getUTCDay() === 6) {
      firstBizDay.setUTCDate(firstBizDay.getUTCDate() + 1);
    }
    dataInicialFmt = formatDateBR(firstBizDay.toISOString());
  } else {
    dataInicialFmt = formatDateBR(dataInicial);
  }
  const dataFinalFmt = formatDateBR(dataFinal);

  return { diasUteis, diasRestantes, pctPassado, mediaDias, projecao, sellers, dataInicial: dataInicialFmt, dataFinal: dataFinalFmt, sheetIcmTotal, sheetMetaClienteTotal, sheetComprouTotal, sheetGapClienteTotal };
}

function parseSemanal(rows) {
  function parseMoney(v) {
    if (v == null || v === '') return 0;
    const s = v.toString().replace(/[^\d.,\-]/g,'').replace(',', '.');
    return parseFloat(s) || 0;
  }

  const weeks = [];

  // Find all header rows by scanning ALL columns for "Equipe"
  const headerRows = [];
  for (let i = 0; i < rows.length; i++) {
    for (let c = 0; c < rows[i].length; c++) {
      if ((rows[i][c]||'').toString().trim() === 'Equipe') {
        headerRows.push({ row: i, colStart: c });
      }
    }
  }
  headerRows.sort((a,b) => a.row - b.row || a.colStart - b.colStart);

  headerRows.forEach(h => {
    const headerRow = rows[h.row];

    // Dynamically detect: scan from colStart+2 to find "Total Vendas semana" col
    // Day cols are those with date-like or "Feriado" labels
    // Total col is the one labeled "Total Vendas semana"
    let totalCol = null;
    const dayCols = [];
    for (let c = h.colStart + 2; c < h.colStart + 10; c++) {
      const label = (headerRow[c] || '').toString().trim();
      if (!label) continue;
      if (label.toLowerCase().includes('total')) {
        totalCol = c;
        break;
      }
      dayCols.push({ col: c, label });
    }

    // If no total col found (like week 1 in old format), totalCol = last day col
    // and total will be calculated by summing days
    const week = { sellers: [], total: 0, dayCols, dayTotals: dayCols.map(()=>0) };

    for (let i = h.row + 1; i < rows.length; i++) {
      const r = rows[i];
      const equipe = (r[h.colStart]   ||'').toString().trim();
      const nome   = (r[h.colStart+1] ||'').toString().trim();

      // Stop if we hit another header block
      if (equipe === 'Equipe') break;

      // Total Geral row
      if (nome.toLowerCase().includes('total') || equipe.toLowerCase().includes('total')) {
        week.dayTotals = dayCols.map(dc => parseMoney(r[dc.col]));
        if (totalCol != null) week.total = parseMoney(r[totalCol]);
        break;
      }

      if (!nome || nome === 'Vendedor') continue;

      const days = dayCols.map(dc => parseMoney(r[dc.col]));
      const sheetTotal = totalCol != null ? parseMoney(r[totalCol]) : 0;
      const sumDays = days.reduce((a,b)=>a+b,0);
      const totalVal = sumDays > 0 ? sumDays : sheetTotal;
      week.sellers.push({ equipe, nome, total: totalVal, days });
    }

    // Recalculate from seller data (most reliable)
    week.total = week.sellers.reduce((s,d)=>s+d.total,0);
    week.dayTotals = dayCols.map((dc,i) => week.sellers.reduce((s,d)=>s+(d.days[i]||0),0));
    weeks.push(week);
  });

  return weeks;
}

let activeFilter = 'all';

function setFilter(equipe) {
  activeFilter = equipe;
  if (window._lastMensalData) {
    renderMensal(window._lastMensalData);
    renderClientes(window._lastMensalData.sellers, window._lastMensalData);
  }
  if (window._lastWeeks) renderSemanal(window._lastWeeks, window._lastMensalData ? window._lastMensalData.sellers : []);
  // Re-apply active state AFTER re-render (toolbarHTML rebuilds buttons)
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.equipe === equipe);
  });
}

function filterSellers(sellers) {
  const filtered = sellers.filter(s => s.equipe === 'SP' || s.equipe === 'POA');
  if (activeFilter === 'all') return filtered;
  return filtered.filter(s => s.equipe === activeFilter);
}

function exportXLSX(headers, rows, filename) {
  if (typeof XLSX === 'undefined') {
    // Fallback to CSV (semicolon-separated, which Excel pt-BR opens correctly by default)
    const lines = [headers.join(';'), ...rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(';'))];
    const blob = new Blob(['\uFEFF' + lines.join('\r\n')], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename.replace('.xlsx', '.csv');
    document.body.appendChild(a);
    a.click();
    a.remove();
    return;
  }
  const wb = XLSX.utils.book_new();
  const wsData = [headers, ...rows];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = headers.map((h, i) => ({ wch: Math.max(h.length + 2, ...rows.map(r => String(r[i]||'').length), 14) }));
  XLSX.utils.book_append_sheet(wb, ws, 'Dados');
  XLSX.writeFile(wb, filename);
}

function toolbarHTML() {
  return `<div class="toolbar">
    <div class="filter-group">
      <button class="filter-btn active" data-equipe="all" onclick="setFilter('all')">Todas as Equipes</button>
      <button class="filter-btn sp" data-equipe="SP" onclick="setFilter('SP')">SP</button>
      <button class="filter-btn poa" data-equipe="POA" onclick="setFilter('POA')">POA</button>
    </div>
    <button class="export-btn" onclick="exportCurrentTab()">⬇ Exportar Excel</button>
  </div>`;
}

function exportCurrentTab() {
  const activeTab = document.querySelector('.tab.active').dataset.tab;
  const sellers = window._lastMensalData ? filterSellers(window._lastMensalData.sellers) : [];
  if (activeTab === 'mensal') {
    const sortedSellers = [...sellers].sort((a,b)=>(b.fat||0)-(a.fat||0));
    const dataRows = sortedSellers.map((d,i) => {
      const icmPct = d.icm != null ? d.icm : ((d.meta||0) > 0 ? (d.fat||0)/(d.meta||1) : 0);
      return [
        i+1, d.nome, d.equipe,
        d.meta||0, d.fat||0, d.agFat||0,
        +(icmPct*100).toFixed(1),
        d.status||'', d.gap||0, d.metaDia||0,
        d.total||0
      ];
    });
    // Grand totals row at the end — use the same source as the on-screen total (sheet ICM when unfiltered)
    const totalMeta  = sortedSellers.reduce((s,d)=>s+(d.meta||0),0);
    const totalFat   = sortedSellers.reduce((s,d)=>s+(d.fat||0),0);
    const totalAgFat = sortedSellers.reduce((s,d)=>s+(d.agFat||0),0);
    const totalGap   = sortedSellers.reduce((s,d)=>s+(d.gap||0),0);
    const totalVendas= sortedSellers.reduce((s,d)=>s+(d.total||0),0);
    const sheetIcmTotal = window._lastMensalData ? window._lastMensalData.sheetIcmTotal : null;
    const icmTotal = (activeFilter === 'all' && sheetIcmTotal != null) ? sheetIcmTotal : (totalMeta>0 ? totalTot/totalMeta : 0);
    const totalPct = +(icmTotal*100).toFixed(1);
    dataRows.push(['', 'TOTAL GERAL', '', totalMeta, totalFat, totalAgFat, totalPct, '', totalGap, '', totalVendas]);

    exportXLSX(
      ['#','Vendedor','Equipe','Meta','Faturado','Ag. Faturar','% Meta','Status','GAP','Meta/Dia','Vendas Total'],
      dataRows,
      'kpis_mensal.xlsx'
    );
  } else if (activeTab === 'clientes') {
    exportXLSX(
      ['Vendedor','Equipe','Meta Clientes','Compraram','GAP','Abertos','C/ Orçamento','Qtd Orçamentos','Total Orçado','Conversão %'],
      [...sellers].sort((a,b)=>(b.fat||0)-(a.fat||0)).map(d => [
        d.nome, d.equipe,
        d.metaCliente||0, d.comprou||0, d.gapC||0, d.aberto||0,
        d.comOrc||0, d.qtdOrc||0, d.totalOrc||0,
        +((d.conv||0)*100).toFixed(1)
      ]),
      'kpis_clientes.xlsx'
    );
  } else if (activeTab === 'semanal') {
    const weeks = window._lastWeeks || [];
    exportXLSX(
      ['Vendedor','Equipe','1ª Semana','2ª Semana','3ª Semana','4ª Semana','Total'],
      [...sellers].sort((a,b)=>(b.fat||0)-(a.fat||0)).map(s => {
        const wv = weeks.map(w => { const f = w.sellers.find(d=>d.nome===s.nome); return f?f.total:0; });
        while(wv.length<4) wv.push(0);
        return [s.nome, s.equipe, ...wv, wv.reduce((a,b)=>a+b,0)];
      }),
      'kpis_semanal.xlsx'
    );
  }
}

function renderMensal(data) {
  window._lastMensalData = data;
  const { diasUteis, diasRestantes, pctPassado, sellers, sheetIcmTotal } = data;

  if (!sellers || sellers.length === 0) {
    document.getElementById('mensal-content').innerHTML = '<div class="error-state"><strong>Nenhum vendedor encontrado.</strong><p>Verifique se a planilha foi importada corretamente.</p></div>';
    return;
  }

  const filtered = filterSellers(sellers);

  // All filtered sellers for Ag.Faturar, Ag.Financeiro, count
  const totalAgFat= filtered.reduce((s,d)=>s+(d.agFat||0),0);
  const totalAgFin= filtered.reduce((s,d)=>s+(d.agFin||0),0);

  // Only sellers WITH a meta for ICM-related calculations (avoids meta=0 denominator distortion)
  const filteredWithMeta = filtered.filter(d=>(d.meta||0)>0);
  const totalMeta = filteredWithMeta.reduce((s,d)=>s+(d.meta||0),0);
  const totalFat  = filteredWithMeta.reduce((s,d)=>s+(d.fat||0),0);
  const totalTot  = filteredWithMeta.reduce((s,d)=>s+(d.total||0),0);
  const totalGap  = filteredWithMeta.reduce((s,d)=>s+(d.gap||0),0);

  // Recalculate Média/Dia and Projeção based on the filtered (filial) Vendas Total
  // (sheet's formula uses Faturado + Ag. Faturar as the base, not Faturado alone)
  const diasPassados = Math.max(diasUteis - diasRestantes, 1);
  const mediaDias = totalTot / diasPassados;
  const projecao  = mediaDias * diasUteis;

  // Update header badges
  document.getElementById('badge-dias').textContent = `${diasRestantes} dias úteis restantes`;
  document.getElementById('badge-pct').textContent  = `${pct(pctPassado)} do mês concluído`;
  document.getElementById('badge-proj').textContent = `Projeção: ${fmt(projecao,0)}`;

  const sorted = [...filtered].sort((a,b)=>{ const ia=a.icm!=null?a.icm:((a.meta||0)>0?(a.total||0)/(a.meta||1):0); const ib=b.icm!=null?b.icm:((b.meta||0)>0?(b.total||0)/(b.meta||1):0); return ib-ia; });

  let rows = '';
  sorted.forEach((d,i) => {
    const icmPct = d.icm != null ? d.icm : ((d.meta||0) > 0 ? (d.fat||0)/(d.meta||1) : 0);
    const barW   = Math.min(icmPct,1)*100;
    const barColor = icmPct>=0.5?'#10A88E':icmPct>=0.2?'#D99B2B':'#E0654A';
    const statusCls = d.status==='No Relógio'?'status-ok':'status-out';
    const dotCls    = d.status==='No Relógio'?'dot-green':'dot-red';
    const gapVal = d.gap||0;
    const gapCls = gapVal<=0?'gap-pos':'gap-neg';
    const gapTxt = gapVal<=0 ? '-'+fmtI(Math.abs(gapVal)) : fmtI(gapVal);
    rows += `<tr>
      <td style="font-family:'JetBrains Mono',monospace;color:var(--muted)">${i+1}</td>
      <td title="${d.nome}">${d.nome}</td>
      <td>${teamBadge(d.equipe)}</td>
      <td class="num mono">${fmtI(d.meta)}</td>
      <td class="num mono">${fmtI(d.fat)}</td>
      <td class="num mono">${d.agFat?fmtI(d.agFat):'—'}</td>
      <td class="num mono">${fmtI(d.total)}</td>
      <td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${barW}%;background:${barColor}"></div></div><span class="prog-label" style="color:${barColor}">${pct(icmPct)}</span></div></td>
      <td><span class="status-badge ${statusCls}"><span class="dot ${dotCls}"></span>${d.status||'—'}</span></td>
      <td class="num ${gapCls}">${gapTxt}</td>
      <td class="num mono">${d.metaDia!=null?fmtI(d.metaDia):'—'}</td>
    </tr>`;
  });

  const icmTotal = (activeFilter === 'all' && sheetIcmTotal != null) ? sheetIcmTotal : (totalMeta>0?totalTot/totalMeta:0);
  rows += `<tr class="totals-row">
    <td colspan="3"><strong>TOTAIS</strong></td>
    <td class="num mono"><strong>${fmtI(totalMeta)}</strong></td>
    <td class="num mono"><strong>${fmtI(totalFat)}</strong></td>
    <td class="num mono"><strong>${fmtI(totalAgFat)}</strong></td>
    <td class="num mono"><strong>${fmtI(totalTot)}</strong></td>
    <td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${Math.min(icmTotal,1)*100}%;background:#D99B2B"></div></div><span class="prog-label" style="color:#D99B2B">${pct(icmTotal)}</span></div></td>
    <td><span class="status-badge status-out"><span class="dot dot-red"></span>Fora do Relógio</span></td>
    <td class="num ${totalGap<=0?'gap-pos':'gap-neg'}"><strong>${totalGap<=0?'-'+fmtI(Math.abs(totalGap)):fmtI(totalGap)}</strong></td>
    <td class="num mono">—</td>
  </tr>`;

  document.getElementById('mensal-content').innerHTML = `
    ${toolbarHTML()}
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Meta Total</div><div class="kpi-value">${fmt(totalMeta,0)}</div><div class="kpi-sub">${filteredWithMeta.length} vendedores</div></div>
      <div class="kpi-card"><div class="kpi-label">Faturado</div><div class="kpi-value green">${fmt(totalFat)}</div><div class="kpi-sub">${pct(icmTotal)} da meta</div></div>
      <div class="kpi-card"><div class="kpi-label">Ag. Faturar</div><div class="kpi-value amber">${fmt(totalAgFat)}</div><div class="kpi-sub">Incluso em Vendas Total</div></div>
      <div class="kpi-card"><div class="kpi-label">Vendas Total</div><div class="kpi-value">${fmt(totalTot)}</div><div class="kpi-sub">Fat. + Ag. Faturar</div></div>
      <div class="kpi-card"><div class="kpi-label">GAP da Meta</div><div class="kpi-value ${totalGap<=0?'green':'red'}">${totalGap<=0?'-'+fmt(Math.abs(totalGap)):fmt(totalGap)}</div><div class="kpi-sub">${totalGap<=0?'Meta superada!':'A fechar no mês'}</div></div>
      <div class="kpi-card"><div class="kpi-label">Projeção</div><div class="kpi-value">${fmt(projecao)}</div><div class="kpi-sub">Baseado em média/dia</div></div>
      <div class="kpi-card"><div class="kpi-label">Média/Dia</div><div class="kpi-value">${fmt(mediaDias)}</div><div class="kpi-sub">Dias úteis passados</div></div>
      <div class="kpi-card"><div class="kpi-label">Ag. Financeiro</div><div class="kpi-value amber">${fmt(totalAgFin)}</div><div class="kpi-sub">Não contabiliza</div></div>
    </div>
    <div class="chart-card" style="display:flex;align-items:center;gap:32px;flex-wrap:wrap">
      <div id="gauge-svg-wrap" style="flex-shrink:0"></div>
      <div>
        <div class="chart-card-title" style="margin-bottom:8px">% da Meta Atingida</div>
        <div style="font-size:13px;color:var(--muted);max-width:280px" id="chart-meta-geral-desc">Faturado em relação à meta total da empresa.</div>
      </div>
    </div>
    <div class="section-title">Ranking de Vendedores — Desempenho vs Meta</div>
    <div class="table-wrap fit"><table>
      <thead><tr>
        <th style="width:30px">#</th><th>Vendedor</th><th style="width:55px">Equipe</th>
        <th class="num">Meta</th><th class="num">Faturado</th><th class="num">Ag. Fat.</th>
        <th class="num">Total</th><th style="min-width:100px">% Meta</th>
        <th style="width:90px">Status</th><th class="num">GAP</th><th class="num">Meta/Dia</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;

  const filtroLabel = activeFilter === 'all' ? 'da empresa' : `da filial ${activeFilter}`;
  document.getElementById('chart-meta-geral-desc').textContent = `Faturado em relação à meta total ${filtroLabel}.`;
  renderMetaGaugeSVG(icmTotal);
}

function renderMetaGaugeSVG(icmTotal) {
  const wrap = document.getElementById('gauge-svg-wrap');
  if (!wrap) return;

  const pctVal = Math.round(icmTotal * 1000) / 10; // one decimal
  const filled = Math.max(0, Math.min(pctVal, 100));
  const color = pctVal>=100?'#10A88E':pctVal>=50?'#D99B2B':'#E0654A';

  const size = 160;
  const stroke = 16;
  const r = (size - stroke) / 2;
  const cx = size / 2;
  const cy = size / 2;
  const circumference = 2 * Math.PI * r;
  const offset = circumference * (1 - filled / 100);

  wrap.innerHTML = `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#262c3e" stroke-width="${stroke}"></circle>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-linecap="round"
        stroke-dasharray="${circumference}"
        stroke-dashoffset="${offset}"
        transform="rotate(-90 ${cx} ${cy})"
        style="transition: stroke-dashoffset 0.6s ease"></circle>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono', monospace" font-size="26" font-weight="700" fill="${color}">
        ${pctVal.toFixed(1)}%
      </text>
    </svg>`;
}

function convBadge(conv) {
  if (conv == null || isNaN(conv)) return '—';
  const pctTxt = pct(conv);
  if (conv < 0.3) {
    return `<span style="color:#9C0006;background:#FFC7CE;padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px">${pctTxt}</span>`;
  }
  return `<span class="mono">${pctTxt}</span>`;
}

function renderClientes(sellers, sheetTotals) {
  const filtered = filterSellers(sellers);
  const useSheetTotals = activeFilter === 'all' && sheetTotals;
  const totalMetaC = useSheetTotals && sheetTotals.sheetMetaClienteTotal != null ? sheetTotals.sheetMetaClienteTotal : filtered.reduce((s,d)=>s+(d.metaCliente||0),0);
  const totalComp  = useSheetTotals && sheetTotals.sheetComprouTotal != null ? sheetTotals.sheetComprouTotal : filtered.reduce((s,d)=>s+(d.comprou||0),0);
  const totalGapC  = useSheetTotals && sheetTotals.sheetGapClienteTotal != null ? sheetTotals.sheetGapClienteTotal : filtered.reduce((s,d)=>s+(d.gapC||0),0);
  const totalAb    = filtered.reduce((s,d)=>s+(d.aberto||0),0);
  const totalOrcC  = filtered.reduce((s,d)=>s+(d.comOrc||0),0);
  const totalQtd   = filtered.reduce((s,d)=>s+(d.qtdOrc||0),0);
  const totalTotO  = filtered.reduce((s,d)=>s+(d.totalOrc||0),0);
  const avgConv    = totalTotO>0 ? filtered.reduce((s,d)=>s+(d.total||0),0)/totalTotO : 0;

  const sorted = [...filtered].sort((a,b)=>{ const ia=a.icm!=null?a.icm:((a.meta||0)>0?(a.total||0)/(a.meta||1):0); const ib=b.icm!=null?b.icm:((b.meta||0)>0?(b.total||0)/(b.meta||1):0); return ib-ia; });
  let rows = '';
  sorted.forEach(d => {
    const gcls = (d.gapC||0)>0?'gap-neg':'gap-pos';
    rows += `<tr>
      <td>${d.nome}</td>
      <td>${teamBadge(d.equipe)}</td>
      <td class="num mono">${d.metaCliente??'—'}</td>
      <td class="num mono">${d.comprou??'—'}</td>
      <td class="num ${gcls}">${d.gapC!=null?(d.gapC>=0?'+':'')+d.gapC:'—'}</td>
      <td class="num mono">${d.aberto??'—'}</td>
      <td class="num mono">${d.comOrc??'—'}</td>
      <td class="num mono">${d.qtdOrc??'—'}</td>
      <td class="num mono">${fmt(d.totalOrc)}</td>
      <td class="num">${convBadge(d.conv)}</td>
    </tr>`;
  });
  const totalGapCls = totalGapC>0?'gap-neg':'gap-pos';
  rows += `<tr class="totals-row">
    <td colspan="2"><strong>TOTAIS</strong></td>
    <td class="num mono"><strong>${totalMetaC}</strong></td>
    <td class="num mono"><strong>${totalComp}</strong></td>
    <td class="num ${totalGapCls}"><strong>${totalGapC>=0?'+':''}${totalGapC}</strong></td>
    <td class="num mono"><strong>${totalAb}</strong></td>
    <td class="num mono"><strong>${totalOrcC}</strong></td>
    <td class="num mono"><strong>${totalQtd}</strong></td>
    <td class="num mono"><strong>${fmt(totalTotO)}</strong></td>
    <td class="num"><strong>${convBadge(avgConv)}</strong></td>
  </tr>`;

  document.getElementById('clientes-content').innerHTML = `
    ${toolbarHTML()}
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Meta Clientes</div><div class="kpi-value">${totalMetaC}</div></div>
      <div class="kpi-card"><div class="kpi-label">Compraram</div><div class="kpi-value green">${totalComp}</div></div>
      <div class="kpi-card"><div class="kpi-label">GAP Clientes</div><div class="kpi-value ${totalGapC>0?'red':'green'}">${totalGapC>=0?'+':''}${totalGapC}</div></div>
      <div class="kpi-card"><div class="kpi-label">Clientes Abertos</div><div class="kpi-value amber">${totalAb}</div></div>
      <div class="kpi-card"><div class="kpi-label">Com Orçamento</div><div class="kpi-value">${totalOrcC}</div></div>
      <div class="kpi-card"><div class="kpi-label">Qtd Orçamentos</div><div class="kpi-value">${totalQtd}</div></div>
      <div class="kpi-card"><div class="kpi-label">Total Orçado/Mês</div><div class="kpi-value">${fmt(totalTotO,0)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Conversão/Mês</div><div class="kpi-value amber">${pct(avgConv)}</div></div>
    </div>
    <div class="section-title">Detalhamento por Vendedor — Clientes & Orçamentos</div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Vendedor</th><th>Equipe</th>
        <th class="num">Meta Clientes</th><th class="num">Compraram</th><th class="num">GAP</th>
        <th class="num">Abertos</th><th class="num">C/ Orçamento</th><th class="num">Qtd Orçam.</th>
        <th class="num">Total Orçado</th><th class="num">Conversão</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function renderSemanal(weeks, sellers) {
  window._lastWeeks = weeks;
  // Ensure 4 weeks
  while (weeks.length < 4) weeks.push({ sellers: [], total: 0 });

  const filtered = filterSellers(sellers);
  const filteredNames = new Set(filtered.map(s => s.nome));

  // Recalculate week totals based on filtered sellers only
  const weekTotals = weeks.map(w =>
    w.sellers.filter(d => filteredNames.has(d.nome)).reduce((s,d)=>s+d.total,0)
  );

  // Build bars (filtered)
  function barsHTML(week) {
    if (!week) return '<p style="color:var(--muted);font-size:13px">Sem dados</p>';
    const sellersInWeek = week.sellers.filter(d => filteredNames.has(d.nome));
    const maxV = Math.max(...sellersInWeek.map(d=>d.total), 1);
    return sellersInWeek
      .filter(d=>d.total>0)
      .sort((a,b)=>b.total-a.total)
      .map(d => {
        const w = (d.total/maxV*100).toFixed(1);
        const col = d.equipe==='SP'?'#7AB4E8':d.equipe==='POA'?'#10A88E':'#D99B2B';
        const firstName = d.nome.split(' ').slice(0,2).join(' ');
        return `<div class="week-row">
          <span class="week-name" title="${d.nome}">${firstName}</span>
          <div class="week-bar-wrap"><div class="week-bar-fill" style="width:${w}%;background:${col}"></div></div>
          <span class="week-val">${fmtN(d.total)}</span>
        </div>`;
      }).join('');
  }

  // Table: match sellers by name across weeks
  let trows = '';
  [...filtered].sort((a,b)=>(b.fat||0)-(a.fat||0)).forEach(s => {
    const wVals = weeks.map(w => {
      const found = w.sellers.find(d=>d.nome===s.nome);
      return found ? found.total : 0;
    });
    const total = wVals.reduce((a,b)=>a+b,0);
    const cells = wVals.map(v=>v>0?`<td class="num mono">${fmt(v)}</td>`:`<td class="num mono" style="color:var(--muted)">—</td>`).join('');
    const empties = weeks.length < 4 ? Array(4-weeks.length).fill('<td class="num mono" style="color:var(--muted)">—</td>').join('') : '';
    trows += `<tr>
      <td>${s.nome}</td>
      <td>${teamBadge(s.equipe)}</td>
      ${cells}${empties}
      <td class="num mono"><strong>${total>0?fmt(total):'—'}</strong></td>
    </tr>`;
  });
  const totCells = weekTotals.map(v=>`<td class="num mono"><strong>${v>0?fmt(v):'—'}</strong></td>`).join('');
  const totEmpties = weeks.length<4?Array(4-weeks.length).fill('<td class="num mono">—</td>').join(''):'';
  trows += `<tr class="totals-row">
    <td colspan="2"><strong>TOTAL GERAL</strong></td>
    ${totCells}${totEmpties}
    <td class="num mono"><strong>${fmt(weekTotals.reduce((a,b)=>a+b,0))}</strong></td>
  </tr>`;

  const weekCards = [0,1,2,3].map(i => {
    const w = weeks[i];
    const lbl = `${i+1}ª Semana`;
    const val = w ? weekTotals[i] : 0;
    const cls = val > 0 ? 'green' : 'red';
    return `<div class="kpi-card"><div class="kpi-label">${lbl}</div><div class="kpi-value ${cls}">${val>0?fmt(val):'R$ 0'}</div><div class="kpi-sub">${val>0?'Total realizado':'Sem dados'}</div></div>`;
  }).join('');

  // Identify the most recent week block that has any sales data.
  // Day labels in the sheet (e.g. "22/mai") don't reliably map to a real
  // calendar date for "today" comparisons, so we rely on data presence
  // and week order instead.
  let currentWeekIdx = 0;
  for (let i = weekTotals.length - 1; i >= 0; i--) {
    if (weekTotals[i] > 0) { currentWeekIdx = i; break; }
  }

  document.getElementById('semanal-content').innerHTML = `
    ${toolbarHTML()}
    <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">${weekCards}</div>

    <div class="section-title">Semana Atual — ${currentWeekIdx+1}ª Semana, vendas por dia</div>
    <div class="week-card" style="margin-bottom:32px;overflow-x:auto">${buildWeekDayTable(weeks[currentWeekIdx], currentWeekIdx, filtered)}</div>

    <div class="section-title">Detalhe Semanal Completo</div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Vendedor</th><th>Equipe</th>
        <th class="num">1ª Semana</th><th class="num">2ª Semana</th>
        <th class="num">3ª Semana</th><th class="num">4ª Semana</th>
        <th class="num">Total</th>
      </tr></thead>
      <tbody>${trows}</tbody>
    </table></div>

    <div class="section-title">Vendas por Dia — Detalhe Diário</div>
    <div id="daily-blocks-wrap"></div>`;

  renderDailyBlocks(weeks, sellers);
}

const DIAS_SEMANA_PT = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const MESES_PT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

function formatDayLabel(raw) {
  if (!raw) return '';
  const s = raw.toString().trim();
  // Already a simple label like "Feriado"
  if (!/\d/.test(s)) return s;

  let dd, mm; // day, month (0-indexed)

  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    // ISO format: extract directly from string to avoid UTC->local timezone shift
    const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    dd = parseInt(m[3]);
    mm = parseInt(m[2]) - 1;
  } else if (/[A-Za-z]{3}\s[A-Za-z]{3}\s\d{1,2}\s\d{4}/.test(s)) {
    // "Mon Jun 22 2026 ..." format: use UTC getters since the date was constructed at UTC midnight
    const d = new Date(s);
    if (!isNaN(d.getTime())) {
      dd = d.getUTCDate();
      mm = d.getUTCMonth();
    }
  } else if (/^\d{1,2}\/\d{1,2}/.test(s)) {
    const parts = s.split('/');
    dd = parseInt(parts[0]);
    mm = parseInt(parts[1]) - 1;
  } else {
    const tryD = new Date(s);
    if (!isNaN(tryD.getTime())) {
      dd = tryD.getUTCDate();
      mm = tryD.getUTCMonth();
    }
  }

  if (dd != null && mm != null && !isNaN(dd) && !isNaN(mm)) {
    return `${String(dd).padStart(2,'0')}/${MESES_PT[mm]}`;
  }
  return s;
}

function buildWeekDayTable(week, idx, filtered) {
  if (!week || !week.dayCols || week.dayCols.length === 0) {
    return `<p style="color:var(--muted);font-size:13px">Sem dados diários para esta semana.</p>`;
  }

  const dayHeaders = week.dayCols.map(dc => `<th class="num">${formatDayLabel(dc.label)}</th>`).join('');

  const sellerRows = filtered
    .map(s => week.sellers.find(d => d.nome === s.nome))
    .filter(Boolean);

  let rows = '';
  sellerRows.sort((a,b)=>b.total-a.total).forEach(d => {
    const cells = d.days.map(v => v>0 ? `<td class="num mono">${fmt(v)}</td>` : `<td class="num mono" style="color:var(--muted)">—</td>`).join('');
    rows += `<tr><td>${d.nome}</td><td>${teamBadge(d.equipe)}</td>${cells}<td class="num mono"><strong>${d.total>0?fmt(d.total):'—'}</strong></td></tr>`;
  });

  const numDays = week.dayCols.length;
  const dayTotalsFiltered = Array(numDays).fill(0);
  let weekTotalFiltered = 0;
  sellerRows.forEach(d => {
    d.days.forEach((v,i) => dayTotalsFiltered[i] += v);
    weekTotalFiltered += d.total;
  });
  const totCells = dayTotalsFiltered.map(v => `<td class="num mono"><strong>${v>0?fmt(v):'—'}</strong></td>`).join('');
  rows += `<tr class="totals-row"><td colspan="2"><strong>Total Geral</strong></td>${totCells}<td class="num mono"><strong>${fmt(weekTotalFiltered)}</strong></td></tr>`;

  return `<div class="table-wrap" style="border:none">
    <table>
      <thead><tr><th>Vendedor</th><th>Equipe</th>${dayHeaders}<th class="num">Total Semana</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderDailyBlocks(weeks, sellers) {
  const wrap = document.getElementById('daily-blocks-wrap');
  if (!wrap) return;

  const filtered = filterSellers(sellers);
  const blocksHTML = weeks.map((week, idx) => {
    return `<div class="week-card" style="margin-bottom:20px;overflow-x:auto">
      <div class="week-card-title">${idx+1}ª Semana</div>
      ${buildWeekDayTable(week, idx, filtered)}
    </div>`;
  }).join('');

  wrap.innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="export-btn" onclick="exportDailyBlocks()">⬇ Exportar Vendas por Dia</button>
    </div>
    ${blocksHTML}`;
}

function exportDailyBlocks() {
  const weeks = window._lastWeeks || [];
  const sellers = window._lastMensalData ? filterSellers(window._lastMensalData.sellers) : [];
  const hasXLSX = typeof XLSX !== 'undefined';
  const wb = hasXLSX ? XLSX.utils.book_new() : null;
  const csvParts = [];

  weeks.forEach((week, idx) => {
    if (!week || !week.dayCols || week.dayCols.length === 0) return;
    const headers = ['Vendedor','Equipe', ...week.dayCols.map(dc=>formatDayLabel(dc.label)), 'Total Semana'];
    const sellerRows = sellers.map(s => week.sellers.find(d => d.nome === s.nome)).filter(Boolean);
    sellerRows.sort((a,b)=>b.total-a.total);
    const data = sellerRows.map(d => [d.nome, d.equipe, ...d.days, d.total]);

    const numDays = week.dayCols.length;
    const dayTotals = Array(numDays).fill(0);
    let weekTotal = 0;
    sellerRows.forEach(d => { d.days.forEach((v,i)=>dayTotals[i]+=v); weekTotal += d.total; });
    data.push(['Total Geral', '', ...dayTotals, weekTotal]);

    if (hasXLSX) {
      const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
      ws['!cols'] = headers.map((h,i) => ({ wch: Math.max(h.length+2, 14) }));
      XLSX.utils.book_append_sheet(wb, ws, `${idx+1}a Semana`);
    } else {
      csvParts.push(`${idx+1}ª Semana`);
      csvParts.push(headers.join(';'));
      data.forEach(row => csvParts.push(row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(';')));
      csvParts.push('');
    }
  });

  if (hasXLSX && wb.SheetNames.length) {
    XLSX.writeFile(wb, 'vendas_por_dia.xlsx');
  } else if (csvParts.length) {
    const blob = new Blob(['\uFEFF' + csvParts.join('\r\n')], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'vendas_por_dia.csv';
    document.body.appendChild(a);
    a.click();
    a.remove();
  } else {
    alert('Não há dados diários disponíveis para exportar nesta semana.');
  }
}

function showError(containerId, msg) {
  document.getElementById(containerId).innerHTML = `
    <div class="error-state">
      <strong>⚠ Não foi possível carregar os dados</strong>
      <p>${msg}</p>
      <p style="margin-top:8px">Verifique se a planilha está compartilhada como "Qualquer pessoa com o link → Leitor" e tente novamente.</p>
    </div>`;
}

async function loadAll() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spin');

  let mensalData = null;

  // Load Mensal first
  try {
    const csvMensal = await fetchCSV('Mensal');
    const rowsMensal = parseCSV(csvMensal);
    mensalData = parseMensal(rowsMensal);
    renderMensal(mensalData);
    renderClientes(mensalData.sellers, mensalData);
    const now = new Date().toLocaleString('pt-BR');
    const MESES_NOME = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const refDate = new Date(mensalData.dataFinal || mensalData.dataInicial);
    const mesNome = !isNaN(refDate) ? MESES_NOME[refDate.getUTCMonth()] + ' ' + refDate.getUTCFullYear() : '';
    if (mesNome) {
      document.title = `Dashboard KPIs — ${mesNome}`;
      document.querySelector('header h1').textContent = `Dashboard de KPIs — 3i Distribuidora · ${mesNome}`;
    }
    const periodo = (mensalData.dataInicial && mensalData.dataFinal) ? ` · Período: ${mensalData.dataInicial} a ${mensalData.dataFinal}` : '';
    document.getElementById('last-update').textContent = `Atualizado em ${now} · ${mensalData.diasUteis} dias úteis no mês${periodo}`;
    document.getElementById('footer-info').textContent = `Dashboard KPIs · Atualizado em ${now} · Uso exclusivo diretoria`;
  } catch (err) {
    console.error(err);
    showError('mensal-content', err.message);
    showError('clientes-content', err.message);
  }

  // Load Semanal independently
  try {
    const csvSemanal = await fetchCSV('Semanal');
    const rowsSemanal = parseCSV(csvSemanal);
    const weeks = parseSemanal(rowsSemanal);
    renderSemanal(weeks, mensalData ? mensalData.sellers : []);
  } catch (err) {
    console.error(err);
    showError('semanal-content', err.message);
  }

  icon.classList.remove('spin');
}

function showTab(el, id) {
  // sync filter buttons active state
  setTimeout(() => document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.equipe === activeFilter)), 50);
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  el.classList.add('active');
}

// Load on start, auto-refresh every 5 minutes
loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
